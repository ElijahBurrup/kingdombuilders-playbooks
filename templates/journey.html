<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Journey | Kingdom Builders</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D4A843;
  --gold-light: #E8C96A;
  --purple-deep: #1A0A2E;
  --purple-dark: #2D1B4E;
  --purple-mid: #4A2D7A;
  --purple-accent: #7B4FBF;
  --cream: #FAF6ED;
  --white: #FFFFFF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  background: linear-gradient(165deg, var(--purple-deep) 0%, var(--purple-dark) 40%, var(--purple-mid) 100%);
  color: var(--white);
  padding: 0 0 80px;
}

/* --- Header --- */
.j-header {
  text-align: center;
  padding: 48px 24px 32px;
}
.j-badge {
  display: inline-block;
  padding: 6px 18px;
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 100px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
}
.j-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 600;
  line-height: 1.2;
  margin-bottom: 8px;
}
.j-subtitle {
  font-size: 15px;
  color: rgba(255,255,255,0.45);
  line-height: 1.6;
}

/* --- Stats Row --- */
.j-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 0 24px 40px;
  flex-wrap: wrap;
}
.j-stat {
  text-align: center;
}
.j-stat-number {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--gold-light);
  line-height: 1;
}
.j-stat-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-top: 4px;
}
.j-progress-bar {
  max-width: 320px;
  margin: 0 auto 40px;
  padding: 0 24px;
}
.j-progress-track {
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}
.j-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 3px;
  transition: width 0.8s ease;
}
.j-progress-text {
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  margin-top: 6px;
}

/* --- Stamps --- */
.j-section {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 24px;
}
.j-section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-bottom: 20px;
  text-align: center;
}
.j-stamps {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 16px;
  margin-bottom: 48px;
}
.j-stamp {
  width: 100px;
  text-align: center;
  padding: 16px 8px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03);
  transition: transform 0.2s;
}
.j-stamp:hover { transform: translateY(-2px); }
.j-stamp--earned {
  border-color: rgba(212,168,67,0.2);
  background: rgba(212,168,67,0.06);
}
.j-stamp--locked {
  opacity: 0.35;
}
.j-stamp-emoji {
  font-size: 28px;
  margin-bottom: 6px;
}
.j-stamp-name {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  line-height: 1.3;
}
.j-stamp-date {
  font-size: 9px;
  color: rgba(255,255,255,0.3);
  margin-top: 4px;
}

/* --- Category Breakdown --- */
.j-categories {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 48px;
}
.j-cat-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 50px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  font-size: 12px;
  font-weight: 500;
}
.j-cat-count {
  background: rgba(212,168,67,0.15);
  color: var(--gold);
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 50px;
}

/* --- Playbook Lists --- */
.j-playbooks {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 48px;
}
.j-pb-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  text-decoration: none;
  color: var(--white);
  transition: all 0.2s;
}
.j-pb-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-1px);
}
.j-pb-emoji { font-size: 24px; flex-shrink: 0; }
.j-pb-info { min-width: 0; }
.j-pb-title {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.j-pb-meta {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin-top: 2px;
}
.j-pb-progress {
  width: 40px;
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
  margin-left: auto;
  flex-shrink: 0;
}
.j-pb-progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 2px;
}

/* --- Empty State --- */
.j-empty {
  text-align: center;
  padding: 40px 24px;
  color: rgba(255,255,255,0.3);
  font-size: 14px;
  line-height: 1.6;
}
.j-empty-emoji { font-size: 40px; margin-bottom: 12px; }

/* --- Back Link --- */
.j-back {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px 8px 12px;
  background: rgba(10,6,20,0.75);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px;
  font-size: 0.7rem;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  transition: all 0.25s;
}
.j-back:hover { background: rgba(10,6,20,0.9); color: var(--gold); border-color: rgba(212,168,67,0.3); }
.j-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

/* --- New stamp toast --- */
.j-toast {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 28px;
  background: rgba(10,6,20,0.95);
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  color: var(--gold-light);
  z-index: 9999;
  animation: slideUp 0.4s ease;
  text-align: center;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* --- Loading --- */
.j-loading {
  text-align: center;
  padding: 80px 24px;
  color: rgba(255,255,255,0.3);
  font-size: 14px;
}
.j-loading-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .j-title { font-size: 30px; }
  .j-stats { gap: 20px; }
  .j-stat-number { font-size: 32px; }
  .j-playbooks { grid-template-columns: 1fr; }
  .j-stamp { width: 80px; padding: 12px 6px; }
  .j-stamp-emoji { font-size: 22px; }
}
@media print { body { background: #fff; color: #000; } }
</style>
{% if ga_id %}<script async src="https://www.googletagmanager.com/gtag/js?id={{ ga_id }}"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','{{ ga_id }}');</script>{% endif %}
</head>
<body>
<a class="j-back" href="{{ prefix }}/"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Playbooks</a>

<div id="j-loading" class="j-loading">
  <div class="j-loading-spinner"></div>
  Loading your journey...
</div>

<div id="j-content" style="display:none">
  <div class="j-header">
    <div class="j-badge">Reading Passport</div>
    <h1 class="j-title">Your Journey</h1>
    <p class="j-subtitle" id="j-subtitle"></p>
  </div>

  <div class="j-stats">
    <div class="j-stat">
      <div class="j-stat-number" id="j-completed-count">0</div>
      <div class="j-stat-label">Completed</div>
    </div>
    <div class="j-stat">
      <div class="j-stat-number" id="j-categories-count">0</div>
      <div class="j-stat-label">Categories</div>
    </div>
    <div class="j-stat">
      <div class="j-stat-number" id="j-stamps-count">0</div>
      <div class="j-stat-label">Stamps</div>
    </div>
  </div>

  <div class="j-progress-bar">
    <div class="j-progress-track">
      <div class="j-progress-fill" id="j-progress-fill" style="width: 0%"></div>
    </div>
    <div class="j-progress-text" id="j-progress-text"></div>
  </div>

  <!-- Stamps Section -->
  <div class="j-section" id="j-stamps-section">
    <div class="j-section-title">Achievement Stamps</div>
    <div class="j-stamps" id="j-stamps"></div>
  </div>

  <!-- Category Breakdown -->
  <div class="j-section" id="j-categories-section" style="display:none">
    <div class="j-section-title">Categories Explored</div>
    <div class="j-categories" id="j-categories"></div>
  </div>

  <!-- In Progress -->
  <div class="j-section" id="j-in-progress-section" style="display:none">
    <div class="j-section-title">In Progress</div>
    <div class="j-playbooks" id="j-in-progress"></div>
  </div>

  <!-- Completed -->
  <div class="j-section" id="j-completed-section" style="display:none">
    <div class="j-section-title">Completed</div>
    <div class="j-playbooks" id="j-completed"></div>
  </div>

  <!-- Empty State -->
  <div class="j-empty" id="j-empty" style="display:none">
    <div class="j-empty-emoji">&#x1F9ED;</div>
    <p>Your reading journey begins with your first playbook.</p>
    <p style="margin-top:8px"><a href="{{ prefix }}/" style="color:var(--gold);text-decoration:none;">Browse playbooks &rarr;</a></p>
  </div>
</div>

<div class="j-toast" id="j-toast"></div>

<script>
(function(){
  var prefix = '{{ prefix }}';

  // All possible achievements for locked display
  var ALL_STAMPS = {
    first_steps:       { name: 'First Steps',       emoji: '\u{1F9ED}', desc: 'Complete your first playbook' },
    series_scholar:    { name: 'Series Scholar',     emoji: '\u{1F393}', desc: 'Complete every playbook in a series' },
    category_explorer: { name: 'Category Explorer',  emoji: '\u{1F30D}', desc: 'Read from 3+ categories' },
    cross_pollinator:  { name: 'Cross Pollinator',   emoji: '\u{1F331}', desc: 'Read from 5+ categories' },
    deep_diver:        { name: 'Deep Diver',         emoji: '\u{1F30A}', desc: '5+ playbooks in one category' },
    all_free:          { name: 'Open Doors',         emoji: '\u{1F513}', desc: 'Read all free playbooks' },
    ten_complete:      { name: 'Double Digits',      emoji: '\u{1F3AF}', desc: 'Complete 10 playbooks' },
    twenty_five:       { name: 'All In',             emoji: '\u{1F451}', desc: 'Complete 25 playbooks' }
  };

  fetch(prefix + '/api/v1/discovery/journey', {
    credentials: 'include'
  })
    .then(function(r) {
      if (r.status === 401) {
        window.location.href = prefix + '/auth?next=' + encodeURIComponent(prefix + '/journey');
        return null;
      }
      return r.json();
    })
    .then(function(data) {
      if (!data) return;

      document.getElementById('j-loading').style.display = 'none';
      document.getElementById('j-content').style.display = 'block';

      // Stats
      document.getElementById('j-completed-count').textContent = data.total_completed;
      document.getElementById('j-categories-count').textContent = data.categories_explored;
      document.getElementById('j-stamps-count').textContent = data.stamps.length;

      // Progress bar
      var pct = data.total_published > 0 ? Math.round((data.total_completed / data.total_published) * 100) : 0;
      document.getElementById('j-progress-fill').style.width = pct + '%';
      document.getElementById('j-progress-text').textContent = data.total_completed + ' of ' + data.total_published + ' playbooks (' + pct + '%)';

      // Subtitle
      if (data.total_completed === 0) {
        document.getElementById('j-subtitle').textContent = 'Start reading to earn your first stamp.';
      } else {
        document.getElementById('j-subtitle').textContent = 'You have explored ' + data.categories_explored + ' categories so far.';
      }

      // Stamps (show all, earned ones highlighted)
      var stampsContainer = document.getElementById('j-stamps');
      var earnedTypes = {};
      data.stamps.forEach(function(s) { earnedTypes[s.stamp_type] = s; });

      Object.keys(ALL_STAMPS).forEach(function(type) {
        var info = ALL_STAMPS[type];
        var earned = earnedTypes[type];
        var div = document.createElement('div');
        div.className = 'j-stamp ' + (earned ? 'j-stamp--earned' : 'j-stamp--locked');
        div.title = info.desc + (earned ? ' (Earned!)' : ' (Locked)');
        div.innerHTML =
          '<div class="j-stamp-emoji">' + info.emoji + '</div>' +
          '<div class="j-stamp-name">' + info.name + '</div>' +
          (earned ? '<div class="j-stamp-date">' + formatDate(earned.earned_at) + '</div>' : '');
        stampsContainer.appendChild(div);
      });

      // Category breakdown
      if (data.category_breakdown && Object.keys(data.category_breakdown).length > 0) {
        document.getElementById('j-categories-section').style.display = 'block';
        var catContainer = document.getElementById('j-categories');
        Object.keys(data.category_breakdown).sort().forEach(function(cat) {
          var chip = document.createElement('div');
          chip.className = 'j-cat-chip';
          chip.innerHTML = cat + ' <span class="j-cat-count">' + data.category_breakdown[cat] + '</span>';
          catContainer.appendChild(chip);
        });
      }

      // In Progress
      if (data.in_progress && data.in_progress.length > 0) {
        document.getElementById('j-in-progress-section').style.display = 'block';
        var ipContainer = document.getElementById('j-in-progress');
        data.in_progress.forEach(function(pb) {
          ipContainer.appendChild(makeCard(pb, true));
        });
      }

      // Completed
      if (data.completed && data.completed.length > 0) {
        document.getElementById('j-completed-section').style.display = 'block';
        var cContainer = document.getElementById('j-completed');
        data.completed.forEach(function(pb) {
          cContainer.appendChild(makeCard(pb, false));
        });
      }

      // Empty state
      if (data.total_completed === 0 && (!data.in_progress || data.in_progress.length === 0)) {
        document.getElementById('j-empty').style.display = 'block';
      }
    })
    .catch(function(err) {
      document.getElementById('j-loading').innerHTML = '<div style="color:rgba(255,255,255,0.4)">Could not load your journey. Please try again.</div>';
    });

  function makeCard(pb, showProgress) {
    var a = document.createElement('a');
    a.href = prefix + '/read/' + pb.slug;
    a.className = 'j-pb-card';
    var html = '<span class="j-pb-emoji">' + (pb.cover_emoji || '') + '</span>' +
      '<div class="j-pb-info"><div class="j-pb-title">' + pb.title + '</div>' +
      '<div class="j-pb-meta">' + pb.category_name;
    if (!showProgress && pb.completed_at) {
      html += ' &middot; ' + formatDate(pb.completed_at);
    }
    html += '</div></div>';
    if (showProgress && pb.scroll_percent > 0) {
      html += '<div class="j-pb-progress"><div class="j-pb-progress-fill" style="width:' + pb.scroll_percent + '%"></div></div>';
    }
    a.innerHTML = html;
    return a;
  }

  function formatDate(iso) {
    if (!iso) return '';
    try {
      var d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    } catch(e) { return ''; }
  }
})();
</script>
</body>
</html>
