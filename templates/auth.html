<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | Kingdom Builders</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D4A843;
  --gold-light: #E8C96A;
  --purple-deep: #1A0A2E;
  --purple-dark: #2D1B4E;
  --purple-mid: #4A2D7A;
  --purple-accent: #7B4FBF;
  --cream: #FAF6ED;
  --white: #FFFFFF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  background: linear-gradient(165deg, var(--purple-deep) 0%, var(--purple-dark) 40%, var(--purple-mid) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}
.auth-container {
  max-width: 420px;
  width: 100%;
}
.auth-badge {
  display: inline-block;
  padding: 6px 18px;
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 100px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 24px;
}
.auth-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px;
  font-weight: 600;
  color: var(--white);
  line-height: 1.2;
  margin-bottom: 8px;
}
.auth-subtitle {
  font-size: 15px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 32px;
  line-height: 1.6;
}

/* --- Tabs --- */
.auth-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 28px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  overflow: hidden;
}
.auth-tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  border: none;
}
.auth-tab.active {
  background: rgba(212,168,67,0.1);
  color: var(--gold);
}
.auth-tab:hover:not(.active) {
  color: rgba(255,255,255,0.6);
}

/* --- Forms --- */
.auth-panel { display: none; }
.auth-panel.active { display: block; }

.form-group {
  margin-bottom: 16px;
}
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: var(--white);
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: rgba(212,168,67,0.4); }
.form-input::placeholder { color: rgba(255,255,255,0.2); }

.auth-btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
}
.auth-btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--purple-deep);
  box-shadow: 0 4px 20px rgba(212,168,67,0.3);
}
.auth-btn-gold:hover {
  box-shadow: 0 6px 28px rgba(212,168,67,0.5);
  transform: translateY(-1px);
}

/* --- Divider --- */
.auth-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 24px 0;
  color: rgba(255,255,255,0.2);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.auth-divider::before,
.auth-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.08);
}

/* --- Google Button --- */
.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  color: rgba(255,255,255,0.7);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}
.google-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.2);
  color: var(--white);
}
.google-btn svg { width: 18px; height: 18px; }

/* --- Error --- */
.auth-error {
  background: rgba(232,93,93,0.1);
  border: 1px solid rgba(232,93,93,0.2);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #f08080;
  line-height: 1.5;
}

/* --- Back Link --- */
.back-link {
  display: block;
  text-align: center;
  margin-top: 28px;
  font-size: 14px;
}
.back-link a {
  color: rgba(255,255,255,0.3);
  text-decoration: none;
  transition: color 0.2s;
}
.back-link a:hover { color: rgba(255,255,255,0.6); }

@media (max-width: 480px) {
  .auth-title { font-size: 28px; }
}
</style>
</head>
<body>
<div class="auth-container">
  <div style="text-align:center;">
    <div class="auth-badge">Kingdom Builders AI</div>
    <h1 class="auth-title">Welcome</h1>
    <p class="auth-subtitle">Sign in to access premium playbooks</p>
  </div>

  {% if error %}
  <div class="auth-error">{{ error }}</div>
  {% endif %}

  <div class="auth-tabs">
    <button class="auth-tab {% if tab != 'register' %}active{% endif %}" onclick="showTab('login')">Sign In</button>
    <button class="auth-tab {% if tab == 'register' %}active{% endif %}" onclick="showTab('register')">Create Account</button>
  </div>

  <!-- Sign In Panel -->
  <div id="login-panel" class="auth-panel {% if tab != 'register' %}active{% endif %}">
    <form method="POST" action="{{ prefix }}/auth/login">
      <input type="hidden" name="next" value="{{ next_url }}">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" required value="{{ email or '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Your password" required>
      </div>
      <button type="submit" class="auth-btn auth-btn-gold">Sign In</button>
      <div style="text-align:center;margin-top:12px">
        <a href="{{ prefix }}/auth/forgot-password" style="font-size:13px;color:rgba(255,255,255,0.35);text-decoration:none;transition:color 0.2s" onmouseover="this.style.color='rgba(255,255,255,0.6)'" onmouseout="this.style.color='rgba(255,255,255,0.35)'">Forgot password?</a>
      </div>
    </form>
  </div>

  <!-- Register Panel -->
  <div id="register-panel" class="auth-panel {% if tab == 'register' %}active{% endif %}">
    <form method="POST" action="{{ prefix }}/auth/register">
      <input type="hidden" name="next" value="{{ next_url }}">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" name="display_name" class="form-input" placeholder="Your name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" required value="{{ email or '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="At least 8 characters" required minlength="8">
      </div>
      <button type="submit" class="auth-btn auth-btn-gold">Create Account</button>
    </form>
  </div>

  <div class="auth-divider">or</div>

  {% if google_client_id %}
  <!-- Hidden form submitted by Google GSI callback -->
  <form id="google-auth-form" method="POST" action="{{ prefix }}/auth/google" style="display:none">
    <input type="hidden" name="credential" id="google-credential">
    <input type="hidden" name="next" value="{{ next_url }}">
  </form>
  <button type="button" id="google-signin-btn" class="google-btn" onclick="googleSignIn()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
  {% else %}
  <button type="button" class="google-btn" disabled style="opacity:0.4;cursor:not-allowed">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Google Sign-In (coming soon)
  </button>
  {% endif %}

  <div class="back-link">
    <a href="{{ prefix }}/">&larr; Back to playbooks</a>
  </div>
</div>

{% if google_client_id %}
<script src="https://accounts.google.com/gsi/client" async defer></script>
{% endif %}
<script>
function showTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
  if (tab === 'register') {
    document.querySelectorAll('.auth-tab')[1].classList.add('active');
    document.getElementById('register-panel').classList.add('active');
  } else {
    document.querySelectorAll('.auth-tab')[0].classList.add('active');
    document.getElementById('login-panel').classList.add('active');
  }
}

{% if google_client_id %}
function handleGoogleCredential(response) {
  document.getElementById('google-credential').value = response.credential;
  document.getElementById('google-auth-form').submit();
}

var _gsiReady = false;
function _initGsi() {
  if (_gsiReady) return;
  _gsiReady = true;
  google.accounts.id.initialize({
    client_id: '{{ google_client_id }}',
    callback: handleGoogleCredential,
  });
  /* Render an invisible Google button we can programmatically click */
  var holder = document.createElement('div');
  holder.id = 'g-btn-holder';
  holder.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(holder);
  google.accounts.id.renderButton(holder, {
    type: 'standard', theme: 'filled_black', size: 'large', width: 400, text: 'continue_with'
  });
}

function googleSignIn() {
  if (typeof google === 'undefined' || !google.accounts) {
    alert('Google Sign-In is still loading. Please try again in a moment.');
    return;
  }
  _initGsi();
  /* Click the real Google button to trigger the popup */
  var gBtn = document.querySelector('#g-btn-holder div[role="button"]');
  if (gBtn) gBtn.click();
}
{% endif %}
</script>
</body>
</html>
