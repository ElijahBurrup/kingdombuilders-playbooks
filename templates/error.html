<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} | The Conductor's Playbook</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D4A843;
  --gold-light: #E8C96A;
  --purple-deep: #1A0A2E;
  --purple-dark: #2D1B4E;
  --purple-mid: #4A2D7A;
  --cream: #FAF6ED;
  --white: #FFFFFF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  background: linear-gradient(165deg, var(--purple-deep) 0%, var(--purple-dark) 40%, var(--purple-mid) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}
.error-card {
  max-width: 480px;
  width: 100%;
  text-align: center;
}
.error-icon {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 28px;
  color: rgba(255,255,255,0.3);
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 16px;
}
.error-message {
  font-size: 16px;
  color: rgba(255,255,255,0.5);
  line-height: 1.7;
  margin-bottom: 32px;
}
.back-link {
  display: inline-block;
  padding: 14px 36px;
  border: 1px solid rgba(212,168,67,0.3);
  color: var(--gold);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  border-radius: 4px;
  transition: all 0.3s ease;
}
.back-link:hover {
  background: rgba(212,168,67,0.08);
  border-color: var(--gold);
}
.error-footer {
  margin-top: 32px;
  font-size: 13px;
  color: rgba(255,255,255,0.2);
}
.error-footer a {
  color: rgba(212,168,67,0.4);
  text-decoration: none;
}
</style>
</head>
<body>
<div class="error-card">
  <div class="error-icon">!</div>
  <h1>{{ title }}</h1>
  <p class="error-message">{{ message }}</p>
  <a href="/conductorsplaybook" class="back-link">Back to The Playbook</a>
  <div class="error-footer">
    <p>Need help? <a href="mailto:support@kingdombuilders.ai">support@kingdombuilders.ai</a></p>
  </div>
</div>
</body>
</html>
