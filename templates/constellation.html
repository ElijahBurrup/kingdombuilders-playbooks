<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellation | Kingdom Builders</title>
<meta name="description" content="Explore all playbooks as an interactive knowledge galaxy. See how ideas connect across faith, finance, AI, leadership, and more.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D4A843;
  --gold-light: #E8C96A;
  --purple-deep: #1A0A2E;
  --purple-dark: #2D1B4E;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', sans-serif;
  background: #0a0612;
  color: #fff;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}
canvas {
  display: block;
  cursor: grab;
}
canvas:active { cursor: grabbing; }

/* --- Overlay UI --- */
.c-back {
  position: fixed; top: 16px; left: 16px; z-index: 100;
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px 8px 12px;
  background: rgba(10,6,20,0.75); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 50px;
  font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7);
  text-decoration: none; transition: all 0.25s;
}
.c-back:hover { background: rgba(10,6,20,0.9); color: var(--gold); border-color: rgba(212,168,67,0.3); }
.c-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

.c-title {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
  text-align: center; pointer-events: none;
}
.c-title h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.6);
}
.c-title p {
  font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 2px;
}

/* --- Legend --- */
.c-legend {
  position: fixed; bottom: 16px; left: 16px; z-index: 100;
  display: flex; flex-wrap: wrap; gap: 8px; max-width: 500px;
}
.c-legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: rgba(255,255,255,0.4);
  padding: 4px 10px; border-radius: 50px;
  background: rgba(10,6,20,0.6); border: 1px solid rgba(255,255,255,0.06);
  cursor: pointer; transition: all 0.2s;
}
.c-legend-item:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.15); }
.c-legend-item.dimmed { opacity: 0.3; }
.c-legend-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

/* --- Tooltip --- */
.c-tooltip {
  display: none; position: fixed; z-index: 200;
  padding: 14px 18px; border-radius: 12px;
  background: rgba(10,6,20,0.95); border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(8px); pointer-events: none;
  max-width: 260px;
}
.c-tooltip-emoji { font-size: 24px; margin-bottom: 4px; }
.c-tooltip-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.c-tooltip-cat { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.c-tooltip-hint { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 6px; }

/* --- Paths overlay --- */
.c-paths-btn {
  position: fixed; bottom: 16px; right: 16px; z-index: 100;
  padding: 10px 20px; border-radius: 50px;
  background: rgba(212,168,67,0.15); border: 1px solid rgba(212,168,67,0.3);
  color: var(--gold); font-size: 12px; font-weight: 600; letter-spacing: 1px;
  cursor: pointer; transition: all 0.2s; text-decoration: none;
}
.c-paths-btn:hover { background: rgba(212,168,67,0.25); }

/* --- Loading --- */
.c-loading {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 300;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #0a0612;
}
.c-loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.c-loading-text { font-size: 14px; color: rgba(255,255,255,0.3); }

@media (max-width: 600px) {
  .c-title h1 { font-size: 16px; }
  .c-legend { max-width: 300px; }
}
</style>
{% if ga_id %}<script async src="https://www.googletagmanager.com/gtag/js?id={{ ga_id }}"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','{{ ga_id }}');</script>{% endif %}
</head>
<body>
<a class="c-back" href="{{ prefix }}/"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Playbooks</a>

<div class="c-title">
  <h1>The Constellation</h1>
  <p>Every playbook. Every connection. Click a star to explore.</p>
</div>

<div class="c-legend" id="c-legend"></div>
<div class="c-tooltip" id="c-tooltip">
  <div class="c-tooltip-emoji" id="tt-emoji"></div>
  <div class="c-tooltip-title" id="tt-title"></div>
  <div class="c-tooltip-cat" id="tt-cat"></div>
  <div class="c-tooltip-hint">Click to read</div>
</div>

<a class="c-paths-btn" href="{{ prefix }}/paths">Reading Paths &rarr;</a>

<div class="c-loading" id="c-loading">
  <div class="c-loading-spinner"></div>
  <div class="c-loading-text">Mapping the constellation...</div>
</div>

<canvas id="canvas"></canvas>

<script>
(function(){
  var prefix = '{{ prefix }}';
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var W, H;
  var nodes = [], edges = [];
  var categoryColors = {};
  var categoryFilter = null; // null = show all

  // Physics
  var REPULSION = 2800;
  var SPRING_K = 0.008;
  var SPRING_LEN = 120;
  var DAMPING = 0.88;
  var GRAVITY = 0.02;

  // Interaction
  var dragNode = null;
  var hoverNode = null;
  var panX = 0, panY = 0;
  var zoom = 1;
  var isPanning = false;
  var panStart = {x:0, y:0};
  var animating = true;
  var settled = false;
  var settleCount = 0;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  fetch(prefix + '/api/v1/discovery/constellation')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById('c-loading').style.display = 'none';
      initGraph(data);
      animate();
    });

  function initGraph(data) {
    var slugIndex = {};
    // Spread nodes in a circle initially
    var n = data.nodes.length;
    data.nodes.forEach(function(d, i) {
      var angle = (2 * Math.PI * i) / n;
      var r = Math.min(W, H) * 0.3;
      var node = {
        slug: d.slug,
        title: d.title,
        emoji: d.cover_emoji || '',
        catName: d.category_name,
        catColor: d.category_color,
        catSlug: d.category_slug,
        isFree: d.is_free,
        x: W/2 + r * Math.cos(angle) + (Math.random() - 0.5) * 40,
        y: H/2 + r * Math.sin(angle) + (Math.random() - 0.5) * 40,
        vx: 0, vy: 0,
        radius: 8
      };
      nodes.push(node);
      slugIndex[d.slug] = node;
      if (!categoryColors[d.category_name]) {
        categoryColors[d.category_name] = d.category_color;
      }
    });

    data.edges.forEach(function(e) {
      if (slugIndex[e.source] && slugIndex[e.target]) {
        edges.push({
          source: slugIndex[e.source],
          target: slugIndex[e.target],
          type: e.connection_type,
          strength: e.strength
        });
      }
    });

    buildLegend();
  }

  function buildLegend() {
    var el = document.getElementById('c-legend');
    var cats = Object.keys(categoryColors).sort();
    cats.forEach(function(cat) {
      var item = document.createElement('div');
      item.className = 'c-legend-item';
      item.innerHTML = '<span class="c-legend-dot" style="background:' + categoryColors[cat] + '"></span>' + cat;
      item.addEventListener('click', function() {
        if (categoryFilter === cat) {
          categoryFilter = null;
          document.querySelectorAll('.c-legend-item').forEach(function(el) { el.classList.remove('dimmed'); });
        } else {
          categoryFilter = cat;
          document.querySelectorAll('.c-legend-item').forEach(function(el) {
            el.classList.toggle('dimmed', el !== item);
          });
          item.classList.remove('dimmed');
        }
      });
      el.appendChild(item);
    });
  }

  function simulate() {
    var totalV = 0;
    // Repulsion (all pairs)
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i + 1; j < nodes.length; j++) {
        var dx = nodes[j].x - nodes[i].x;
        var dy = nodes[j].y - nodes[i].y;
        var dist = Math.sqrt(dx*dx + dy*dy) || 1;
        var f = REPULSION / (dist * dist);
        var fx = (dx / dist) * f;
        var fy = (dy / dist) * f;
        nodes[i].vx -= fx;
        nodes[i].vy -= fy;
        nodes[j].vx += fx;
        nodes[j].vy += fy;
      }
    }
    // Spring (edges)
    edges.forEach(function(e) {
      var dx = e.target.x - e.source.x;
      var dy = e.target.y - e.source.y;
      var dist = Math.sqrt(dx*dx + dy*dy) || 1;
      var f = SPRING_K * (dist - SPRING_LEN) * e.strength;
      var fx = (dx / dist) * f;
      var fy = (dy / dist) * f;
      e.source.vx += fx;
      e.source.vy += fy;
      e.target.vx -= fx;
      e.target.vy -= fy;
    });
    // Gravity toward center
    nodes.forEach(function(n) {
      n.vx += (W/2 - n.x) * GRAVITY;
      n.vy += (H/2 - n.y) * GRAVITY;
    });
    // Apply velocities
    nodes.forEach(function(n) {
      if (n === dragNode) return;
      n.vx *= DAMPING;
      n.vy *= DAMPING;
      n.x += n.vx;
      n.y += n.vy;
      totalV += Math.abs(n.vx) + Math.abs(n.vy);
    });
    // Check if settled
    if (totalV < 0.5 * nodes.length) {
      settleCount++;
      if (settleCount > 60) settled = true;
    } else {
      settleCount = 0;
      settled = false;
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(zoom, zoom);

    // Edges
    edges.forEach(function(e) {
      var sVisible = !categoryFilter || e.source.catName === categoryFilter;
      var tVisible = !categoryFilter || e.target.catName === categoryFilter;
      var alpha = (sVisible && tVisible) ? 0.12 : 0.02;

      ctx.beginPath();
      ctx.moveTo(e.source.x, e.source.y);
      ctx.lineTo(e.target.x, e.target.y);

      var edgeColor = 'rgba(255,255,255,' + alpha + ')';
      if (e.type === 'bridge' && alpha > 0.05) {
        edgeColor = 'rgba(212,168,67,' + (alpha * 1.5) + ')';
      }
      ctx.strokeStyle = edgeColor;
      ctx.lineWidth = e.type === 'bridge' ? 1.2 : 0.6;
      ctx.stroke();
    });

    // Nodes
    nodes.forEach(function(n) {
      var visible = !categoryFilter || n.catName === categoryFilter;
      var isHover = n === hoverNode;
      var alpha = visible ? 1 : 0.12;
      var r = isHover ? 14 : (visible ? 10 : 6);

      // Glow
      if (visible) {
        var grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 3);
        grd.addColorStop(0, n.catColor + (isHover ? '40' : '15'));
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r * 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // Circle
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fillStyle = hexToRgba(n.catColor, alpha * 0.9);
      ctx.fill();
      if (isHover) {
        ctx.strokeStyle = n.catColor;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // Emoji (only if visible and zoomed enough or hovered)
      if (visible && (zoom > 0.7 || isHover)) {
        ctx.font = (isHover ? '16px' : '12px') + ' sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(n.emoji, n.x, n.y);
      }

      // Title label on hover
      if (isHover) {
        ctx.font = '600 13px Outfit, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillText(n.title, n.x, n.y + r + 16);
        ctx.font = '500 10px Outfit, sans-serif';
        ctx.fillStyle = n.catColor;
        ctx.fillText(n.catName, n.x, n.y + r + 30);
      }
    });

    ctx.restore();
  }

  function hexToRgba(hex, a) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }

  function animate() {
    if (!settled || dragNode) simulate();
    draw();
    requestAnimationFrame(animate);
  }

  // --- Interaction ---
  function screenToWorld(sx, sy) {
    return { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
  }

  function findNode(sx, sy) {
    var p = screenToWorld(sx, sy);
    var best = null, bestDist = 20 / zoom;
    nodes.forEach(function(n) {
      var d = Math.sqrt((n.x - p.x) * (n.x - p.x) + (n.y - p.y) * (n.y - p.y));
      if (d < bestDist) { best = n; bestDist = d; }
    });
    return best;
  }

  canvas.addEventListener('mousedown', function(e) {
    var node = findNode(e.clientX, e.clientY);
    if (node) {
      dragNode = node;
      settled = false;
      settleCount = 0;
    } else {
      isPanning = true;
      panStart = { x: e.clientX - panX, y: e.clientY - panY };
    }
  });

  canvas.addEventListener('mousemove', function(e) {
    if (dragNode) {
      var p = screenToWorld(e.clientX, e.clientY);
      dragNode.x = p.x;
      dragNode.y = p.y;
      dragNode.vx = 0;
      dragNode.vy = 0;
    } else if (isPanning) {
      panX = e.clientX - panStart.x;
      panY = e.clientY - panStart.y;
    } else {
      var node = findNode(e.clientX, e.clientY);
      hoverNode = node;
      canvas.style.cursor = node ? 'pointer' : 'grab';
    }
  });

  canvas.addEventListener('mouseup', function(e) {
    if (dragNode) {
      // If barely moved, treat as click
      var node = findNode(e.clientX, e.clientY);
      if (node === dragNode) {
        window.location.href = prefix + '/read/' + node.slug;
      }
      dragNode = null;
    }
    isPanning = false;
  });

  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.08 : 0.92;
    var mx = e.clientX, my = e.clientY;
    panX = mx - factor * (mx - panX);
    panY = my - factor * (my - panY);
    zoom *= factor;
    zoom = Math.max(0.3, Math.min(3, zoom));
  }, { passive: false });

  // Touch support
  var lastTouchDist = 0;
  canvas.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      var t = e.touches[0];
      var node = findNode(t.clientX, t.clientY);
      if (node) {
        dragNode = node;
        settled = false;
      } else {
        isPanning = true;
        panStart = { x: t.clientX - panX, y: t.clientY - panY };
      }
    } else if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist = Math.sqrt(dx*dx + dy*dy);
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    if (e.touches.length === 1) {
      var t = e.touches[0];
      if (dragNode) {
        var p = screenToWorld(t.clientX, t.clientY);
        dragNode.x = p.x; dragNode.y = p.y;
        dragNode.vx = 0; dragNode.vy = 0;
      } else if (isPanning) {
        panX = t.clientX - panStart.x;
        panY = t.clientY - panStart.y;
      }
    } else if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (lastTouchDist > 0) {
        var factor = dist / lastTouchDist;
        var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        var cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        panX = cx - factor * (cx - panX);
        panY = cy - factor * (cy - panY);
        zoom *= factor;
        zoom = Math.max(0.3, Math.min(3, zoom));
      }
      lastTouchDist = dist;
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    if (dragNode && e.changedTouches.length === 1) {
      var t = e.changedTouches[0];
      var node = findNode(t.clientX, t.clientY);
      if (node === dragNode) {
        window.location.href = prefix + '/read/' + node.slug;
      }
    }
    dragNode = null;
    isPanning = false;
    lastTouchDist = 0;
  });
})();
</script>
</body>
</html>
