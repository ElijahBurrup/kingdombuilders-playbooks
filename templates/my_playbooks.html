<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Playbooks | Kingdom Builders</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D4A843;
  --gold-light: #E8C96A;
  --purple-deep: #1A0A2E;
  --purple-dark: #2D1B4E;
  --purple-mid: #4A2D7A;
  --purple-accent: #7B4FBF;
  --cream: #FAF6ED;
  --white: #FFFFFF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  background: linear-gradient(165deg, var(--purple-deep) 0%, var(--purple-dark) 40%, var(--purple-mid) 100%);
  color: var(--white);
  padding: 0 0 80px;
}

/* --- Header --- */
.mp-header {
  text-align: center;
  padding: 48px 24px 32px;
}
.mp-badge {
  display: inline-block;
  padding: 6px 18px;
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 100px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
}
.mp-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 600;
  line-height: 1.2;
  margin-bottom: 8px;
}
.mp-subtitle {
  font-size: 15px;
  color: rgba(255,255,255,0.45);
  line-height: 1.6;
}
.mp-email {
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  margin-top: 4px;
}

/* --- Subscriber Banner --- */
.mp-sub-banner {
  display: none;
  max-width: 600px;
  margin: 0 auto 32px;
  padding: 14px 24px;
  text-align: center;
  border-radius: 12px;
  background: rgba(212,168,67,0.1);
  border: 1px solid rgba(212,168,67,0.25);
  color: var(--gold-light);
  font-size: 14px;
  font-weight: 500;
}
.mp-sub-banner-icon {
  margin-right: 6px;
}

/* --- Stats --- */
.mp-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 0 24px 40px;
  flex-wrap: wrap;
}
.mp-stat {
  text-align: center;
}
.mp-stat-number {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--gold-light);
  line-height: 1;
}
.mp-stat-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-top: 4px;
}

/* --- Section --- */
.mp-section {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
}
.mp-section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-bottom: 20px;
  text-align: center;
}

/* --- Playbook Grid --- */
.mp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
  margin-bottom: 48px;
}
.mp-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  text-decoration: none;
  color: var(--white);
  transition: all 0.2s;
}
.mp-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-1px);
}
.mp-card-emoji { font-size: 28px; flex-shrink: 0; }
.mp-card-info { min-width: 0; flex: 1; }
.mp-card-title {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.mp-card-cat {
  display: inline-block;
  margin-top: 4px;
  padding: 2px 10px;
  border-radius: 50px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  background: rgba(212,168,67,0.12);
  color: var(--gold);
}
.mp-card-arrow {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  stroke: rgba(255,255,255,0.25);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: stroke 0.2s;
}
.mp-card:hover .mp-card-arrow {
  stroke: var(--gold);
}

/* --- Empty State --- */
.mp-empty {
  display: none;
  text-align: center;
  padding: 60px 24px;
  color: rgba(255,255,255,0.3);
  font-size: 14px;
  line-height: 1.6;
}
.mp-empty-icon { font-size: 48px; margin-bottom: 16px; }
.mp-empty a {
  color: var(--gold);
  text-decoration: none;
  font-weight: 500;
}
.mp-empty a:hover { text-decoration: underline; }

/* --- Back Link --- */
.mp-back {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px 8px 12px;
  background: rgba(10,6,20,0.75);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px;
  font-size: 0.7rem;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  transition: all 0.25s;
}
.mp-back:hover { background: rgba(10,6,20,0.9); color: var(--gold); border-color: rgba(212,168,67,0.3); }
.mp-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

/* --- Loading --- */
.mp-loading {
  text-align: center;
  padding: 80px 24px;
  color: rgba(255,255,255,0.3);
  font-size: 14px;
}
.mp-loading-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .mp-title { font-size: 30px; }
  .mp-stats { gap: 20px; }
  .mp-stat-number { font-size: 32px; }
  .mp-grid { grid-template-columns: 1fr; }
}
</style>
{% if ga_id %}<script async src="https://www.googletagmanager.com/gtag/js?id={{ ga_id }}"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','{{ ga_id }}');</script>{% endif %}
</head>
<body>
<a class="mp-back" href="{{ prefix }}/"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Playbooks</a>

<div id="mp-loading" class="mp-loading">
  <div class="mp-loading-spinner"></div>
  Loading your playbooks...
</div>

<div id="mp-content" style="display:none">
  <div class="mp-header">
    <div class="mp-badge">Your Library</div>
    <h1 class="mp-title">My Playbooks</h1>
    <p class="mp-subtitle" id="mp-subtitle"></p>
    <p class="mp-email" id="mp-email"></p>
  </div>

  <div class="mp-sub-banner" id="mp-sub-banner">
    <span class="mp-sub-banner-icon">&#x2728;</span>
    <span id="mp-sub-text">All Access Subscriber. Every playbook is yours to read.</span>
    <div id="mp-sub-details" style="margin-top:10px;font-size:13px;color:rgba(255,255,255,0.4);display:none">
      <span id="mp-sub-plan"></span> &middot; <span id="mp-sub-renews"></span>
    </div>
    <div style="margin-top:12px">
      <a id="mp-manage-sub" href="#" style="display:none;padding:8px 24px;border-radius:50px;border:1px solid rgba(212,168,67,0.3);color:var(--gold);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:all 0.2s" onmouseover="this.style.background='rgba(212,168,67,0.1)'" onmouseout="this.style.background='transparent'">Manage Subscription</a>
    </div>
  </div>

  <div class="mp-stats">
    <div class="mp-stat">
      <div class="mp-stat-number" id="mp-count">0</div>
      <div class="mp-stat-label">Playbooks</div>
    </div>
  </div>

  <!-- Playbook Grid -->
  <div class="mp-section" id="mp-grid-section" style="display:none">
    <div class="mp-section-title">Your Collection</div>
    <div class="mp-grid" id="mp-grid"></div>
  </div>

  <!-- Empty State -->
  <div class="mp-empty" id="mp-empty">
    <div class="mp-empty-icon">&#x1F4DA;</div>
    <p>You do not own any playbooks yet.</p>
    <p style="margin-top:12px"><a href="{{ prefix }}/">Browse the catalog &rarr;</a></p>
  </div>
</div>

<script>
(function(){
  var prefix = '{{ prefix }}';

  fetch(prefix + '/api/v1/my-playbooks', {
    credentials: 'include'
  })
    .then(function(r) {
      if (r.status === 401) {
        window.location.href = prefix + '/auth?next=' + encodeURIComponent(prefix + '/my-playbooks');
        return null;
      }
      return r.json();
    })
    .then(function(data) {
      if (!data) return;

      document.getElementById('mp-loading').style.display = 'none';
      document.getElementById('mp-content').style.display = 'block';

      // Email
      if (data.email) {
        document.getElementById('mp-email').textContent = data.email;
      }

      // Subscriber banner
      if (data.is_subscriber) {
        document.getElementById('mp-sub-banner').style.display = 'block';
        var manageBtn = document.getElementById('mp-manage-sub');
        manageBtn.style.display = 'inline-block';
        manageBtn.addEventListener('click', function(e) {
          e.preventDefault();
          var form = document.createElement('form');
          form.method = 'POST';
          form.action = prefix + '/manage-subscription';
          document.body.appendChild(form);
          form.submit();
        });
        if (data.subscription) {
          var sub = data.subscription;
          var planLabel = sub.plan_type === 'monthly' ? '$10/mo' : sub.plan_type === 'yearly' ? '$100/yr' : sub.plan_type;
          var renewDate = sub.current_period_end ? new Date(sub.current_period_end).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '';
          var renewText = sub.cancel_at_period_end ? 'Cancels ' + renewDate : 'Renews ' + renewDate;
          document.getElementById('mp-sub-plan').textContent = planLabel;
          document.getElementById('mp-sub-renews').textContent = renewText;
          document.getElementById('mp-sub-details').style.display = 'block';
          if (sub.cancel_at_period_end) {
            document.getElementById('mp-sub-text').textContent = 'Subscription active until ' + renewDate + '.';
          }
        }
      }

      var playbooks = data.playbooks || [];
      document.getElementById('mp-count').textContent = playbooks.length;

      // Subtitle
      if (data.is_subscriber) {
        document.getElementById('mp-subtitle').textContent = 'All ' + playbooks.length + ' playbooks available with your subscription.';
      } else if (playbooks.length > 0) {
        document.getElementById('mp-subtitle').textContent = playbooks.length + ' playbook' + (playbooks.length !== 1 ? 's' : '') + ' in your collection.';
      } else {
        document.getElementById('mp-subtitle').textContent = 'Start building your collection today.';
      }

      // Grid
      if (playbooks.length > 0) {
        document.getElementById('mp-grid-section').style.display = 'block';
        var grid = document.getElementById('mp-grid');
        playbooks.forEach(function(pb) {
          var a = document.createElement('a');
          a.href = prefix + '/read/' + pb.slug;
          a.className = 'mp-card';
          a.innerHTML =
            '<span class="mp-card-emoji">' + (pb.cover_emoji || '&#x1F4D6;') + '</span>' +
            '<div class="mp-card-info">' +
              '<div class="mp-card-title">' + pb.title + '</div>' +
              (pb.category_name ? '<span class="mp-card-cat">' + pb.category_name + '</span>' : '') +
            '</div>' +
            '<svg class="mp-card-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>';
          grid.appendChild(a);
        });
      } else {
        document.getElementById('mp-empty').style.display = 'block';
      }
    })
    .catch(function(err) {
      document.getElementById('mp-loading').innerHTML = '<div style="color:rgba(255,255,255,0.4)">Could not load your playbooks. Please try again.</div>';
    });
})();
</script>
</body>
</html>
