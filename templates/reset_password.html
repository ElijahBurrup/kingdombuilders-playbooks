<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password | Kingdom Builders</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D4A843;
  --gold-light: #E8C96A;
  --purple-deep: #1A0A2E;
  --purple-dark: #2D1B4E;
  --purple-mid: #4A2D7A;
  --white: #FFFFFF;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  background: linear-gradient(165deg, var(--purple-deep) 0%, var(--purple-dark) 40%, var(--purple-mid) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}
.container { max-width: 420px; width: 100%; }
.badge {
  display: inline-block;
  padding: 6px 18px;
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 100px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 24px;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  font-weight: 600;
  color: var(--white);
  line-height: 1.2;
  margin-bottom: 8px;
}
.subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 28px;
  line-height: 1.6;
}
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: var(--white);
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: rgba(212,168,67,0.4); }
.form-input::placeholder { color: rgba(255,255,255,0.2); }
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 16px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--purple-deep);
  box-shadow: 0 4px 20px rgba(212,168,67,0.3);
}
.btn:hover {
  box-shadow: 0 6px 28px rgba(212,168,67,0.5);
  transform: translateY(-1px);
}
.error {
  background: rgba(232,93,93,0.1);
  border: 1px solid rgba(232,93,93,0.2);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #f08080;
  line-height: 1.5;
}
.back-link {
  display: block;
  text-align: center;
  margin-top: 24px;
  font-size: 14px;
}
.back-link a {
  color: rgba(255,255,255,0.3);
  text-decoration: none;
  transition: color 0.2s;
}
.back-link a:hover { color: rgba(255,255,255,0.6); }
</style>
{% if ga_id %}<script async src="https://www.googletagmanager.com/gtag/js?id={{ ga_id }}"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','{{ ga_id }}');</script>{% endif %}
</head>
<body>
<div class="container" style="text-align:center">
  <div class="badge">Kingdom Builders AI</div>
  <h1>Set New Password</h1>
  <p class="subtitle">Choose a new password for your account.</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ prefix }}/auth/reset-password" style="text-align:left">
    <input type="hidden" name="token" value="{{ token }}">
    <div style="margin-bottom:16px">
      <label class="form-label">New Password</label>
      <input type="password" name="password" class="form-input" placeholder="At least 8 characters" required minlength="8">
    </div>
    <div style="margin-bottom:16px">
      <label class="form-label">Confirm Password</label>
      <input type="password" name="password_confirm" class="form-input" placeholder="Repeat your password" required minlength="8">
    </div>
    <button type="submit" class="btn">Reset Password</button>
  </form>

  <div class="back-link">
    <a href="{{ prefix }}/auth">&larr; Back to sign in</a>
  </div>
</div>
</body>
</html>
